<!DOCTYPE html>
<html>
<head>
  <title>SHRV</title>
  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: Helvetica, Arial, sans-serif;
    }

    .ticker {
      background: black;
      color: rgba(255,255,255,0.85);
      overflow: hidden;
      white-space: nowrap;
      font-size: 0.9em;
      padding: 0.4em 0;
    }

    .ticker-text {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 18s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .line {
      height: 0.08em;
      background: #ddd;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    h1 {
      font-size: 8em;
      letter-spacing: -0.05em;
      margin: 0;
      animation: fade 1.2s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(0.5em); }
      to { opacity: 1; transform: translateY(0); }
    }

    .corner {
      position: absolute;
      bottom: 1.5em;
      left: 1.5em;
      font-size: 0.8em;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="ticker">
    <div class="ticker-text">
      take it easy&nbsp;&nbsp;&nbsp;take it easy&nbsp;&nbsp;&nbsp;take it easy
    </div>
  </div>

  <div class="line"></div>

  <div class="hero">
    <h1>shrv.</h1>
    <div class="corner">shrv / 001</div>
  </div>

</body>
</html>
