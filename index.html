<!DOCTYPE html>
<html>
<head>
  <title>SHRV</title>
  <style>
    body {
      margin: 0;
      background: #eee;
      font-family: Helvetica, Arial, sans-serif;
    }

    .ticker {
      background: black;
      color: white;
      overflow: hidden;
      white-space: nowrap;
      font-size: 14px;
      padding: 6px 0;
    }

    .ticker-text {
      display: inline-block;
      padding-left: 100%;
      animation: scroll 10s linear infinite;
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 120px;
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="ticker">
    <div class="ticker-text">
      designed for easy dressing designed for easy dressing designed for easy dressing
    </div>
  </div>

  <div class="hero">
    <h1>shrv.</h1>
  </div>

</body>
</html>
